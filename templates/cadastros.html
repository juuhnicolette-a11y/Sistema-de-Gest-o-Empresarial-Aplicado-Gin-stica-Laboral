<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastros | VitaLab</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="system-page">

<div class="sidebar">

    <div class="sidebar-logo">
        <i class="fa-solid fa-person-running"></i>
        <h2>VitaLab</h2>
    </div>

    <ul class="sidebar-menu">

        <li>
            <a href="dashboard.html">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>
        </li>

        <li>
            <a href="cadastros.html">
                <i class="fa-solid fa-users"></i>
                Cadastros
            </a>
        </li>

        <li>
            <a href="planejamento.html">
                <i class="fa-solid fa-calendar-check"></i>
                Planejamento
            </a>
        </li>

        <li>
            <a href="financeiro.html">
                <i class="fa-solid fa-wallet"></i>
                Financeiro
            </a>
        </li>

        <li>
            <a href="relatorios.html">
                <i class="fa-solid fa-chart-column"></i>
                Relatórios
            </a>
        </li>

    </ul>

</div>

<div class="content-area">

    <div class="topbar">
        <h1>Cadastros</h1>
        <p>Consulte empresas e professores cadastrados.</p>
    </div>

    <div class="table-card">

        <div class="filters-grid">

            <input type="text" placeholder="Buscar cadastro...">

            <select>
                <option>Empresas</option>
                <option>Professores</option>
            </select>

            <select>
                <option>Ativos</option>
                <option>Inativos</option>
            </select>

        </div>

        <div class="table-header">

            <h2>Lista de Cadastros</h2>

            <a href="visualizacao-cadastro.html">
                <button class="secondary-button">
                    Acessar Cadastro
                </button>
            </a>

        </div>

        <div class="table-wrapper">

            <table>

                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Tipo</th>
                        <th>Status</th>
                        <th>Acessar</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>
                        <td>Empresa Saúde Ativa</td>
                        <td>Empresa</td>
                        <td>Ativo</td>

                        <td>
                            <a href="visualizacao-cadastro.html" class="record-link">
                                Ver
                                <i class="fa-solid fa-chevron-right"></i>
                            </a>
                        </td>
                    </tr>

                    <tr>
                        <td>João Silva</td>
                        <td>Professor</td>
                        <td>Ativo</td>

                        <td>
                            <a href="visualizacao-cadastro.html" class="record-link">
                                Ver
                                <i class="fa-solid fa-chevron-right"></i>
                            </a>
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
