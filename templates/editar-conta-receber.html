<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Conta a Receber | VitaLab</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="system-page">

<div class="sidebar">
    <div class="sidebar-logo">
        <i class="fa-solid fa-person-running"></i>
        <h2>VitaLab</h2>
    </div>

    <ul class="sidebar-menu">
        <li><a href="/dashboard"><i class="fa-solid fa-house"></i>Dashboard</a></li>
        <li><a href="/cadastros"><i class="fa-solid fa-users"></i>Cadastros</a></li>
        <li><a href="/planejamento"><i class="fa-solid fa-calendar-check"></i>Planejamento</a></li>
        <li><a href="/financeiro"><i class="fa-solid fa-wallet"></i>Financeiro</a></li>
        <li><a href="/relatorios"><i class="fa-solid fa-chart-column"></i>Relatórios</a></li>
    </ul>
</div>

<div class="content-area">

    <div class="topbar">
        <h1>Editar Conta a Receber</h1>
        <p>Atualize os dados do recebimento selecionado.</p>
    </div>

    <form method="POST" action="/editar-conta-receber/{{ conta['id'] }}">

        <div class="form-card">

            <div class="table-header">
                <h2>Dados da Conta</h2>
            </div>

            <div class="form-grid">

                <div>
                    <label>Data de Recebimento</label>
                    <input type="date"
                           name="data_recebimento"
                           value="{{ conta['data_recebimento'] or '' }}">
                </div>

                <div>
                    <label>Valor</label>
                    <input type="text"
                           name="valor"
                           value="{{ conta['valor'] or '' }}">
                </div>

                <div>
                    <label>Cadastro Vinculado</label>

                    <select name="cadastro_id">

                        <option value="">
                            Selecione pessoa/empresa
                        </option>

                        {% for cadastro in cadastros %}

                        <option value="{{ cadastro['id'] }}"
                            {% if conta['cadastro_id'] == cadastro['id'] %}
                                selected
                            {% endif %}>

                            {% if cadastro['tipo'] == 'Empresa' %}
                                {{ cadastro['nome_fantasia'] }}
                            {% else %}
                                {{ cadastro['nome_professor'] }}
                            {% endif %}

                        </option>

                        {% endfor %}

                    </select>
                </div>

                <div>
                    <label>Classificação</label>

                    <select name="classificacao">

                        <option value="Mensalidade"
                            {% if conta['classificacao'] == 'Mensalidade' %}
                                selected
                            {% endif %}>
                            Mensalidade
                        </option>

                        <option value="Contrato"
                            {% if conta['classificacao'] == 'Contrato' %}
                                selected
                            {% endif %}>
                            Contrato
                        </option>

                        <option value="Serviço avulso"
                            {% if conta['classificacao'] == 'Serviço avulso' %}
                                selected
                            {% endif %}>
                            Serviço avulso
                        </option>

                        <option value="Outros"
                            {% if conta['classificacao'] == 'Outros' %}
                                selected
                            {% endif %}>
                            Outros
                        </option>

                    </select>
                </div>

                <div>
                    <label>Status</label>

                    <select name="status">

                        <option value="Pendente"
                            {% if conta['status'] == 'Pendente' %}
                                selected
                            {% endif %}>
                            Pendente
                        </option>

                        <option value="Recebido"
                            {% if conta['status'] == 'Recebido' %}
                                selected
                            {% endif %}>
                            Recebido
                        </option>

                        <option value="Cancelado"
                            {% if conta['status'] == 'Cancelado' %}
                                selected
                            {% endif %}>
                            Cancelado
                        </option>

                    </select>
                </div>

                <div>
                    <label>Observações</label>

                    <textarea name="observacoes">{{ conta['observacoes'] or '' }}</textarea>
                </div>

            </div>

            <div class="action-buttons">

                <a href="/contas-receber">
                    <button type="button" class="secondary-button">
                        Cancelar
                    </button>
                </a>

                <button type="submit" class="secondary-button">
                    Salvar Alterações
                </button>

            </div>

        </div>

    </form>

</div>

</body>
</html>
