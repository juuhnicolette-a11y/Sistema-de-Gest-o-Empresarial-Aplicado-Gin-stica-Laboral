<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novo Cadastro | VitaLab</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="system-page">

<div class="sidebar">
    <div class="sidebar-logo">
        <i class="fa-solid fa-person-running"></i>
        <h2>VitaLab</h2>
    </div>

    <ul class="sidebar-menu">
        <li><a href="/dashboard"><i class="fa-solid fa-house"></i>Dashboard</a></li>
        <li><a href="/cadastros"><i class="fa-solid fa-users"></i>Cadastros</a></li>
        <li><a href="/planejamento"><i class="fa-solid fa-calendar-check"></i>Planejamento</a></li>
        <li><a href="/financeiro"><i class="fa-solid fa-wallet"></i>Financeiro</a></li>
        <li><a href="/relatorios"><i class="fa-solid fa-chart-column"></i>Relatórios</a></li>
    </ul>
</div>

<div class="content-area">

    <div class="topbar">
        <h1>Novo Cadastro</h1>
        <p>Cadastre uma nova empresa ou professor.</p>
    </div>

    <form method="POST" action="/novo-cadastro">

        <div class="form-card">
            <div class="table-header">
                <h2>Tipo de Cadastro</h2>
            </div>

            <div class="form-grid">
                <div>
                    <label>Tipo</label>
                    <select name="tipo" id="tipoCadastro" onchange="alternarTipoCadastro()">
                        <option value="Empresa">Empresa</option>
                        <option value="Professor">Professor</option>
                    </select>
                </div>

                <div>
                    <label>Status</label>
                    <select name="status">
                        <option value="Ativo">Ativo</option>
                        <option value="Inativo">Inativo</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-card" id="camposEmpresa">
            <div class="table-header">
                <h2>Empresa Contratante</h2>
            </div>

            <div class="form-grid">
                <div>
                    <label>Razão Social</label>
                    <input type="text" name="razao_social">
                </div>

                <div>
                    <label>Nome Fantasia</label>
                    <input type="text" name="nome_fantasia">
                </div>

                <div>
                    <label>CNPJ</label>
                    <input type="text" name="cnpj">
                </div>

                <div>
                    <label>Inscrição Estadual</label>
                    <input type="text" name="inscricao_estadual">
                </div>

                <div>
                    <label>Endereço</label>
                    <input type="text" name="endereco">
                </div>

                <div>
                    <label>Contato Responsável</label>
                    <input type="text" name="contato_responsavel">
                </div>

                <div>
                    <label>E-mail</label>
                    <input type="text" name="email">
                </div>

                <div>
                    <label>Data Início Contrato</label>
                    <input type="date" name="data_inicio_contrato">
                </div>

                <div>
                    <label>Data Renovação Contrato</label>
                    <input type="date" name="data_renovacao_contrato">
                </div>

                <div>
                    <label>Valor Pago Mensal</label>
                    <input type="text" name="valor_mensal">
                </div>

                <div>
                    <label>Dia Pagamento</label>
                    <input type="number" name="dia_pagamento">
                </div>

                <div>
                    <label>Horários/Dias das Aulas</label>
                    <input type="text" name="horarios_aulas">
                </div>

                <div>
                    <label>Professor Responsável</label>
                    <select name="professor_responsavel_id">
                        <option value="">Selecione um professor</option>

                        {% for professor in professores %}
                        <option value="{{ professor['id'] }}">
                            {{ professor['nome_professor'] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label>Dados Pagamento</label>
                    <input type="text" name="dados_pagamento">
                </div>

                <div>
                    <label>Quantidade de Alunos</label>
                    <input type="number" name="quantidade_alunos">
                </div>
            </div>
        </div>

        <div class="form-card" id="camposProfessor">
            <div class="table-header">
                <h2>Professor</h2>
            </div>

            <div class="form-grid">
                <div>
                    <label>Nome</label>
                    <input type="text" name="nome_professor">
                </div>

                <div>
                    <label>CPF</label>
                    <input type="text" name="cpf">
                </div>

                <div>
                    <label>Registro MEI</label>
                    <input type="text" name="registro_mei">
                </div>

                <div>
                    <label>Registro CREF</label>
                    <input type="text" name="registro_cref">
                </div>

                <div>
                    <label>Endereço</label>
                    <input type="text" name="endereco">
                </div>

                <div>
                    <label>E-mail</label>
                    <input type="text" name="email">
                </div>

                <div>
                    <label>Dia Pagamento</label>
                    <input type="number" name="dia_pagamento">
                </div>

                <div>
                    <label>Empresas Vinculadas</label>
                    <input type="text" name="empresas_vinculadas">
                </div>

                <div>
                    <label>Valor Pagamento</label>
                    <input type="text" name="valor_pagamento">
                </div>

                <div>
                    <label>Dados Pagamento</label>
                    <input type="text" name="dados_pagamento">
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <a href="/cadastros">
                <button type="button" class="secondary-button">Cancelar</button>
            </a>

            <button type="submit" class="secondary-button">
                Salvar Cadastro
            </button>
        </div>

    </form>

</div>

<script>
function alternarTipoCadastro() {
    const tipo = document.getElementById("tipoCadastro").value;
    const camposEmpresa = document.getElementById("camposEmpresa");
    const camposProfessor = document.getElementById("camposProfessor");

    if (tipo === "Empresa") {
        camposEmpresa.style.display = "block";
        camposProfessor.style.display = "none";
    } else {
        camposEmpresa.style.display = "none";
        camposProfessor.style.display = "block";
    }
}

document.addEventListener("DOMContentLoaded", alternarTipoCadastro);
</script>

</body>
</html>
