<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualização de Cadastro | VitaLab</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="system-page">

<div class="sidebar">
    <div class="sidebar-logo">
        <i class="fa-solid fa-person-running"></i>
        <h2>VitaLab</h2>
    </div>

    <ul class="sidebar-menu">
        <li><a href="/dashboard"><i class="fa-solid fa-house"></i>Dashboard</a></li>
        <li><a href="/cadastros"><i class="fa-solid fa-users"></i>Cadastros</a></li>
        <li><a href="/planejamento"><i class="fa-solid fa-calendar-check"></i>Planejamento</a></li>
        <li><a href="/financeiro"><i class="fa-solid fa-wallet"></i>Financeiro</a></li>
        <li><a href="/relatorios"><i class="fa-solid fa-chart-column"></i>Relatórios</a></li>
    </ul>
</div>

<div class="content-area">

    <div class="topbar">
        <h1>Visualização de Cadastro</h1>
        <p>Confira os dados do cadastro selecionado.</p>
    </div>

    {% if cadastro['tipo'] == 'Empresa' %}

    <div class="form-card">
        <div class="table-header">
            <h2>Empresa Contratante</h2>
        </div>

        <div class="form-grid">
            <div>
                <label>Razão Social</label>
                <input type="text" value="{{ cadastro['razao_social'] or '' }}" readonly>
            </div>

            <div>
                <label>Nome Fantasia</label>
                <input type="text" value="{{ cadastro['nome_fantasia'] or '' }}" readonly>
            </div>

            <div>
                <label>CNPJ</label>
                <input type="text" value="{{ cadastro['cnpj'] or '' }}" readonly>
            </div>

            <div>
                <label>Inscrição Estadual</label>
                <input type="text" value="{{ cadastro['inscricao_estadual'] or '' }}" readonly>
            </div>

            <div>
                <label>Endereço</label>
                <input type="text" value="{{ cadastro['endereco'] or '' }}" readonly>
            </div>

            <div>
                <label>Contato Responsável</label>
                <input type="text" value="{{ cadastro['contato_responsavel'] or '' }}" readonly>
            </div>

            <div>
                <label>E-mail</label>
                <input type="text" value="{{ cadastro['email'] or '' }}" readonly>
            </div>

            <div>
                <label>Data Início Contrato</label>
                <input type="text" value="{{ cadastro['data_inicio_contrato'] or '' }}" readonly>
            </div>

            <div>
                <label>Data Renovação Contrato</label>
                <input type="text" value="{{ cadastro['data_renovacao_contrato'] or '' }}" readonly>
            </div>

            <div>
                <label>Valor Pago Mensal</label>
                <input type="text" value="{{ cadastro['valor_mensal'] or '' }}" readonly>
            </div>

            <div>
                <label>Dia Pagamento</label>
                <input type="text" value="{{ cadastro['dia_pagamento'] or '' }}" readonly>
            </div>

            <div>
                <label>Horários/Dias das Aulas</label>
                <input type="text" value="{{ cadastro['horarios_aulas'] or '' }}" readonly>
            </div>

            <div>
                <label>Dados Pagamento</label>
                <input type="text" value="{{ cadastro['dados_pagamento'] or '' }}" readonly>
            </div>

            <div>
                <label>Quantidade de Alunos</label>
                <input type="text" value="{{ cadastro['quantidade_alunos'] or '' }}" readonly>
            </div>
        </div>
    </div>

    {% endif %}

    {% if cadastro['tipo'] == 'Professor' %}

    <div class="form-card">
        <div class="table-header">
            <h2>Professor</h2>
        </div>

        <div class="form-grid">
            <div>
                <label>Nome</label>
                <input type="text" value="{{ cadastro['nome_professor'] or '' }}" readonly>
            </div>

            <div>
                <label>CPF</label>
                <input type="text" value="{{ cadastro['cpf'] or '' }}" readonly>
            </div>

            <div>
                <label>Registro MEI</label>
                <input type="text" value="{{ cadastro['registro_mei'] or '' }}" readonly>
            </div>

            <div>
                <label>Registro CREF</label>
                <input type="text" value="{{ cadastro['registro_cref'] or '' }}" readonly>
            </div>

            <div>
                <label>Endereço</label>
                <input type="text" value="{{ cadastro['endereco'] or '' }}" readonly>
            </div>

            <div>
                <label>E-mail</label>
                <input type="text" value="{{ cadastro['email'] or '' }}" readonly>
            </div>

            <div>
                <label>Dia Pagamento</label>
                <input type="text" value="{{ cadastro['dia_pagamento'] or '' }}" readonly>
            </div>

            <div>
                <label>Empresas Vinculadas</label>
                <input type="text" value="{{ cadastro['empresas_vinculadas'] or '' }}" readonly>
            </div>

            <div>
                <label>Valor Pagamento</label>
                <input type="text" value="{{ cadastro['valor_pagamento'] or '' }}" readonly>
            </div>

            <div>
                <label>Dados Pagamento</label>
                <input type="text" value="{{ cadastro['dados_pagamento'] or '' }}" readonly>
            </div>
        </div>
    </div>

    {% endif %}

    <div class="action-buttons">
        <a href="/cadastros">
            <button class="secondary-button">Voltar</button>
        </a>

        <a href="/editar-cadastro/{{ cadastro['id'] }}">
            <button class="secondary-button">Editar Cadastro</button>
        </a>
    </div>

</div>

</body>
</html>
