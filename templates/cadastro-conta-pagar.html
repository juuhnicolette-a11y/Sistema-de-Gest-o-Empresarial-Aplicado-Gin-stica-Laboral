<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Conta a Pagar | VitaLab</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="system-page">

<div class="sidebar">
    <div class="sidebar-logo"><i class="fa-solid fa-person-running"></i><h2>VitaLab</h2></div>
    <ul class="sidebar-menu">
        <li><a href="/dashboard"><i class="fa-solid fa-house"></i>Dashboard</a></li>
        <li><a href="/cadastros"><i class="fa-solid fa-users"></i>Cadastros</a></li>
        <li><a href="/planejamento"><i class="fa-solid fa-calendar-check"></i>Planejamento</a></li>
        <li><a href="/financeiro"><i class="fa-solid fa-wallet"></i>Financeiro</a></li>
        <li><a href="/relatorios"><i class="fa-solid fa-chart-column"></i>Relatórios</a></li>
    </ul>
</div>

<div class="content-area">

    <div class="topbar">
        <h1>Nova Conta a Pagar</h1>
        <p>Cadastre uma nova despesa vinculada a uma pessoa ou empresa.</p>
    </div>

    <form method="POST" action="/cadastro-conta-pagar">

        <div class="form-card">

            <div class="table-header">
                <h2>Dados da Conta</h2>
            </div>

            <div class="form-grid">

                <div>
                    <label>Data de Vencimento</label>
                    <input type="date" name="data_vencimento">
                </div>

                <div>
                    <label>Valor</label>
                    <input type="text" name="valor" placeholder="Ex: R$ 1.200,00">
                </div>

                <div>
                    <label>Cadastro Vinculado</label>
                    <select name="cadastro_id">
                        <option value="">Selecione pessoa/empresa</option>

                        {% for cadastro in cadastros %}
                        <option value="{{ cadastro['id'] }}">
                            {% if cadastro['tipo'] == 'Empresa' %}
                                {{ cadastro['nome_fantasia'] }}
                            {% else %}
                                {{ cadastro['nome_professor'] }}
                            {% endif %}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label>Classificação</label>
                    <select name="classificacao">
                        <option value="">Selecione a classificação</option>
                        <option value="Professor">Professor</option>
                        <option value="Fornecedor">Fornecedor</option>
                        <option value="Insumos">Insumos</option>
                        <option value="Serviços">Serviços</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>

                <div>
                    <label>Status</label>
                    <select name="status">
                        <option value="Pendente">Pendente</option>
                        <option value="Pago">Pago</option>
                        <option value="Cancelado">Cancelado</option>
                    </select>
                </div>

                <div>
                    <label>Observações</label>
                    <textarea name="observacoes" placeholder="Inclua observações sobre esta conta."></textarea>
                </div>

            </div>

            <div class="action-buttons">
                <a href="/contas-pagar">
                    <button type="button" class="secondary-button">Cancelar</button>
                </a>

                <button type="submit" class="secondary-button">
                    Salvar Conta
                </button>
            </div>

        </div>

    </form>

</div>

</body>
</html>
