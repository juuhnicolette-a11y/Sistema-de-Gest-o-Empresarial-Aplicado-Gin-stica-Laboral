<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Cronograma | VitaLab</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="system-page">

<div class="sidebar">
    <div class="sidebar-logo">
        <i class="fa-solid fa-person-running"></i>
        <h2>VitaLab</h2>
    </div>

    <ul class="sidebar-menu">
        <li><a href="/dashboard"><i class="fa-solid fa-house"></i>Dashboard</a></li>
        <li><a href="/cadastros"><i class="fa-solid fa-users"></i>Cadastros</a></li>
        <li><a href="/planejamento"><i class="fa-solid fa-calendar-check"></i>Planejamento</a></li>
        <li><a href="/financeiro"><i class="fa-solid fa-wallet"></i>Financeiro</a></li>
        <li><a href="/relatorios"><i class="fa-solid fa-chart-column"></i>Relatórios</a></li>
    </ul>
</div>

<div class="content-area">

    <div class="topbar">
        <h1>Editar Cronograma</h1>
        <p>Atualize os dados do cronograma.</p>
    </div>

    <form method="POST">

        <div class="form-card">

            <div class="table-header">
                <h2>Dados do Cronograma</h2>
            </div>

            <div class="form-grid">

                <div>
                    <label>Empresa</label>

                    <select name="empresa_id">

                        {% for empresa in empresas %}

                        <option value="{{ empresa['id'] }}"
                            {% if cronograma['empresa_id'] == empresa['id'] %}
                                selected
                            {% endif %}>

                            {{ empresa['nome_fantasia'] }}

                        </option>

                        {% endfor %}

                    </select>
                </div>

                <div>
                    <label>Professor Responsável</label>

                    <select name="professor_id">

                        {% for professor in professores %}

                        <option value="{{ professor['id'] }}"
                            {% if cronograma['professor_id'] == professor['id'] %}
                                selected
                            {% endif %}>

                            {{ professor['nome_professor'] }}

                        </option>

                        {% endfor %}

                    </select>
                </div>

                <div>
                    <label>Exercícios</label>

                    <select name="exercicios" multiple>

                        {% for exercicio in exercicios %}

                        <option value="{{ exercicio['id'] }}"
                            {% if exercicio['id'] in exercicios_ids %}
                                selected
                            {% endif %}>

                            {{ exercicio['nome'] }}

                        </option>

                        {% endfor %}

                    </select>
                </div>

                <div>
                    <label>Insumos Necessários</label>

                    <textarea name="insumos">{{ cronograma['insumos'] }}</textarea>
                </div>

            </div>

            <div class="action-buttons">

                <a href="/cronogramas">
                    <button type="button" class="secondary-button">
                        Voltar
                    </button>
                </a>

                <button type="submit" class="secondary-button">
                    Salvar Alterações
                </button>

            </div>

        </div>

    </form>

</div>

</body>
</html>
