<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Cronograma | VitaLab</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="system-page">

    <div class="sidebar">

        <h2>VitaLab</h2>

        <ul>
            <li><i class="fa-solid fa-users"></i> Cadastros</li>
            <li><i class="fa-solid fa-calendar-check"></i> Planejamento</li>
            <li><i class="fa-solid fa-money-bill-wave"></i> Financeiro</li>
            <li><i class="fa-solid fa-chart-column"></i> Relatórios</li>
        </ul>

    </div>

    <div class="content-area">

        <div class="top-bar">
            <h1>Cadastro Cronograma</h1>
        </div>

        <div class="info-card">

            <div class="form-grid">

                <div>
                    <label>Lista Exercícios / Dia</label>
                    <textarea></textarea>
                </div>

                <div>
                    <label>Dados Empresa</label>
                    <input type="text">
                </div>

                <div>
                    <label>Professor Responsável</label>
                    <input type="text">
                </div>

                <div>
                    <label>Insumos Necessários</label>
                    <textarea></textarea>
                </div>

            </div>

            <div class="button-group">
                <button>Salvar Cronograma</button>
            </div>

        </div>

    </div>

</body>
</html>
