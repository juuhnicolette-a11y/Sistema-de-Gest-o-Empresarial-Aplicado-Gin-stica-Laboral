<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastros | VitaLab</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="system-page">

    <div class="sidebar">
        <h2>VitaLab</h2>

        <ul>
            <li><i class="fa-solid fa-users"></i> Cadastros</li>
            <li><i class="fa-solid fa-calendar-check"></i> Planejamento</li>
            <li><i class="fa-solid fa-money-bill-wave"></i> Financeiro</li>
            <li><i class="fa-solid fa-chart-column"></i> Relatórios</li>
        </ul>
    </div>

    <div class="content-area">

        <div class="top-bar">
            <h1>Cadastros</h1>
        </div>

        <div class="search-area">

            <input type="text" placeholder="Buscar cadastro...">

            <select>
                <option>Empresas</option>
                <option>Professores</option>
            </select>

            <select>
                <option>Ativos</option>
                <option>Inativos</option>
            </select>

        </div>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Tipo</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Empresa Saúde Ativa</td>
                    <td>Empresa</td>
                    <td>Ativo</td>
                </tr>

                <tr>
                    <td>João Silva</td>
                    <td>Professor</td>
                    <td>Ativo</td>
                </tr>
            </tbody>
        </table>

        <div class="button-group">
            <a href="dashboard.html">
                <button class="secondary-button">Voltar</button>
            </a>
</html>
